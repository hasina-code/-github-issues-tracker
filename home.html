<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Issues Tracker</title>

  <!-- font awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <!-- tailwind + daisyui  -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

  <style>
    * {
      font-family: "Geist", sans-serif;
    }
  </style>
</head>

<body class="bg-gray-50">
  <!-- Navbar -->
  <nav class="flex flex-col md:flex-row justify-between items-center px-5 md:px-10 py-4 bg-white shadow">
    <div class="flex items-center gap-3 mb-3 md:mb-0">
      <img class="w-8" src="./assets/github-logo.png" alt="Logo">
      <h2 class="text-xl font-bold">GitHub Issues Tracker</h2>
    </div>

    <div class="flex gap-3">
      <input id="search-input" type="text" placeholder="Search issues..." class="input input-bordered w-48 md:w-64" />
      <button class="btn btn-primary">+ New Issue</button>
    </div>
  </nav>

  <script src="./script.js"></script>
</body>
</html>
