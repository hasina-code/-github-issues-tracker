<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Issues Tracker</title>

  <!-- font awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <!-- tailwind + daisyui  -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

  <style>
    * {
      font-family: "Geist", sans-serif;
    }
  </style>
</head>

<body class="bg-gray-50">
  <!-- Navbar -->
  <nav class="flex flex-col md:flex-row justify-between items-center px-5 md:px-10 py-4 bg-white shadow">
    <div class="flex items-center gap-3 mb-3 md:mb-0">
      <img class="w-8" src="./assets/github-logo.png" alt="Logo">
      <h2 class="text-xl font-bold">GitHub Issues Tracker</h2>
    </div>
  
    <div class="flex gap-3">
      <input id="search-input" type="text" placeholder="Search issues..." class="input input-bordered w-48 md:w-64" />
      <button class="btn btn-primary"> Search</button>
    </div>
  </nav>
  <br>


<!-- Tab Section -->
  <section>
  <div class="max-w-7xl mx-auto px-5 md:px-10 mt-6 ">
    <!-- Tabs -->
    <div class="flex gap-4 items-center px-5 md:px-10 py-4 bg-white shadow">
  
      <button id="tab-all" class="btn tab-btn btn-primary">All</button>
      <button id="tab-open" class="btn tab-btn btn-outline">Open</button>
      <button id="tab-closed" class="btn tab-btn btn-outline">Closed</button>
    </div>
  
    <!-- Stats Section -->
    <div class="flex flex-col md:flex-row justify-between items-center mt-6 px-5 md:px-10 py-4 bg-white shadow">
      <div class="flex items-center gap-4  md:mb-0">
      <!-- Left: Icon + Issue Count + Text -->
        <div class="bg-purple-100 p-3 rounded-full text-purple-600 text-xl">
          <img src="./assets/Aperture.png" alt="">
        </div>
  
        <div>
          <h3 class="text-xl font-bold" id="issue-count">0 Issues</h3>
          <p class="text-gray-500">Track and manage your project issues</p>
        </div>
      </div>

      <!-- Right: Open / Closed Badges -->
    <div class="flex gap-2">
      <span class=" text-green-800 font-semibold text-sm  gap-1">
        <i class="fas fa-circle text-xs"></i> Open
      </span>
      <span class=" text-purple-800 font-semibold text-sm  gap-1">
        <i class="fas fa-circle text-xs"></i> Closed
      </span>
    </div>
  </section>

  <script src="./script.js"></script>
</body>
</html>
